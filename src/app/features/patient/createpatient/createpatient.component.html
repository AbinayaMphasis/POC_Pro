<!-- ── NAVBAR ──────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg intake-navbar">
  <a class="navbar-brand text-white fw-bold" href="#">APOLLO HOSPITALS</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
    data-bs-target="#navbarContent" aria-controls="navbarContent"
    aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarContent">
    <ul class="navbar-nav me-auto mb-2 mb-lg-0"></ul>
  </div>
</nav>

<!-- ── PAGE WRAPPER ──────────────────────────────────── -->
<div class="intake-page-bg">
  <div class="container intake-container">

    <!-- Page header -->
    <div class="intake-page-header">
      <div>
        <h2 class="intake-title">{{ pageTitle }}</h2>
        <p class="intake-subtitle">{{ pageSubtitle }}</p>
      </div>
      <button mat-stroked-button class="btn btn-outline-back" type="button" (click)="goBackToDashboard()">
        &#8592; Back
      </button>
    </div>

    <!-- ── Drug Selection (only in create mode) ─────────────────── -->
    <div *ngIf="isCreateMode" class="intake-card mb-4">
      <div class="intake-card-body">
        <div *ngIf="selectedCaseType" class="mb-3">
          <strong>Case Type:</strong> {{ selectedCaseType }}
        </div>
        <div class="row align-items-center text-md-center g-2">
          <div *ngFor="let drug of availableDrugs" class="col-12 col-md-4">
            <div class="drug-radio-card" [class.selected]="selectedDrugId === drug.drugId">
              <p-radioButton
                name="drugSelection"
                [inputId]="drug.drugId"
                [value]="drug.drugId"
                [(ngModel)]="selectedDrugId"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="onDrugChange($event)">
              </p-radioButton>
              <label class="drug-radio-label" [for]="drug.drugId">
                <span class="drug-name">{{ drug.name }}</span>
              </label>
            </div>
          </div>
        </div>
        <div *ngIf="!availableDrugs.length" class="text-muted mt-3">
          No drugs are configured for the selected case type.
        </div>
      </div>
    </div>

    <!-- ── Read-only case/drug info (view/edit mode) ───────────── -->
    <div *ngIf="!isCreateMode" class="intake-card mb-4">
      <div class="intake-card-body">
        <div class="row">
          <div class="col-md-4 form-group">
            <label class="field-label"><strong>Case Type:</strong></label>
            <span class="ms-2">{{ selectedCaseType || '-' }}</span>
          </div>
          <div class="col-md-4 form-group">
            <label class="field-label"><strong>Selected Drug:</strong></label>
            <span class="ms-2">{{ getSelectedDrugName() }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- FORM (shown after drug selected in create, or always in view/edit) -->
    <form *ngIf="selectedDrugId || !isCreateMode" [formGroup]="patientForm" novalidate>

      <!-- 1. Patient Information -->
      <app-patient-info-section [patientForm]="patientForm" [readonly]="isViewMode"></app-patient-info-section>

      <!-- 2. Medical History -->
      <app-medical-history-section [patientForm]="patientForm" [readonly]="isViewMode"></app-medical-history-section>

      <!-- 3. Insurance Details -->
      <app-insurance-section [patientForm]="patientForm" [readonly]="isViewMode"></app-insurance-section>

      <!-- 4. Physician -->
      <app-physician-section [patientForm]="patientForm" [readonly]="isViewMode"></app-physician-section>

      <!-- 5. Prescription -->
      <app-prescription-section [patientForm]="patientForm" [readonly]="isViewMode"></app-prescription-section>

      <!-- 6. Consent for Treatment -->
      <app-consent-section [patientForm]="patientForm" [readonly]="isViewMode"></app-consent-section>

      <!-- ── Submit row (hidden in view mode) ──────────────────── -->
      <div *ngIf="!isViewMode" class="intake-submit-row">
        <button mat-raised-button color="primary" class="btn btn-intake-submit" type="button" (click)="onSubmit()">
          &#10003;&nbsp; {{ isEditMode ? 'Update' : 'Submit' }}
        </button>
        <button mat-stroked-button class="btn btn-intake-reset" type="button" (click)="patientForm.reset()">
          &#8635;&nbsp; Reset Form
        </button>
      </div>

    </form>

  </div>
</div>
