<div class="container">
    <hr>
    <hr>
    <hr>
    <h3>Update Medicine</h3>
    <form [formGroup]="medicineForm">
        <div class="form-group">
            <label>ID</label>
            <input type="number" class="form-control" formControlName="id" readonly>
        </div>

        <div class="form-group">
            <label>Drug Name</label>
            <input type="text" class="form-control" formControlName="drugName">
            <div *ngIf="medicineForm.get('drugName')?.invalid && (medicineForm.get('drugName')?.dirty || medicineForm.get('drugName')?.touched)" class="text-danger">
              <small *ngIf="medicineForm.get('drugName')?.errors?.['required']">Drug name is required.</small>
              <small *ngIf="medicineForm.get('drugName')?.errors?.['minlength']">Drug name must be at least 2 characters.</small>
              <small *ngIf="medicineForm.get('drugName')?.errors?.['maxlength']">Drug name cannot exceed 100 characters.</small>
            </div>
        </div>

        <div class="form-group">
            <label>Stock</label>
            <input type="number" class="form-control" formControlName="stock">
            <div *ngIf="medicineForm.get('stock')?.invalid && (medicineForm.get('stock')?.dirty || medicineForm.get('stock')?.touched)" class="text-danger">
              <small *ngIf="medicineForm.get('stock')?.errors?.['required']">Stock is required.</small>
              <small *ngIf="medicineForm.get('stock')?.errors?.['min']">Stock cannot be negative.</small>
            </div>
        </div>
        <br>
        <button type="button" class="btn btn-success" (click)="onSubmit()" [disabled]="medicineForm.invalid">Submit</button>
    </form>
</div>
